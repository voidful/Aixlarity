name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate docs and IDE landing page
        run: node docs/validate.mjs

      - name: Check skill YAML frontmatter
        run: |
          pip install pyyaml --break-system-packages -q
          python3 -c "
          import yaml, glob, sys
          errors = []
          for path in glob.glob('.aixlarity/skills/*/SKILL.md'):
              with open(path) as f:
                  content = f.read()
              if not content.startswith('---'):
                  errors.append(f'{path}: missing YAML frontmatter')
                  continue
              parts = content.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{path}: malformed frontmatter')
                  continue
              try:
                  meta = yaml.safe_load(parts[1])
                  assert 'name' in meta, 'missing name'
                  assert 'description' in meta, 'missing description'
              except Exception as e:
                  errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f'All skills valid.')
          "

  ide-product-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CI-safe Aixlarity IDE product quality gate
        working-directory: aixlarity-ide
        run: npm run test-aixlarity-quality
