<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aixlarity IDE — Open-source AI Agent Workbench</title>
    <meta name="description" content="Aixlarity IDE 是開源 AI agent workbench，讓每次 AI 修改都有 Mission Control、Artifact Review、Browser Evidence、Terminal Replay、Visual Diff、Provider Control 與 Knowledge Ledger。">
    <meta name="theme-color" content="#111827">
    <meta property="og:image" content="https://aixlarity.com/assets/aixlarity-icon-512.png">
    <meta name="twitter:image" content="https://aixlarity.com/assets/aixlarity-icon-512.png">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="assets/aixlarity-icon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="style.css?v=20260511-product-home4">
</head>
<body>
    <a class="skip-link" href="#mainContent">跳到主要內容</a>

    <div class="bg-grid" aria-hidden="true"></div>
    <div class="beam beam-1" aria-hidden="true"></div>
    <div class="beam beam-2" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="切換章節選單" aria-controls="sidebar" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-mark" aria-hidden="true">
                    <img src="assets/aixlarity-icon.png" alt="">
                </div>
                <div class="logo-text">
                    <span class="logo-title">Aixlarity</span>
                    <span class="logo-sub">Open Agent Workbench</span>
                </div>
            </div>

            <div class="sidebar-intro">
                <p>Mission · Artifacts · Evidence · Diff</p>
            </div>
        </div>

        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="搜尋章節或關鍵詞 (/)" autocomplete="off">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>

        <nav class="sidebar-nav" id="sidebarNav" aria-label="章節導覽"></nav>

        <div class="sidebar-footer">
            <div class="reading-progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="progress-text" id="progressText">載入章節中…</span>
        </div>
    </aside>

    <aside class="chapter-rail" id="chapterRail" aria-label="章節導讀">
        <div class="rail-card rail-hero">
            <div class="rail-label">本章導讀</div>
            <h2 id="railTitle">載入中…</h2>
            <p class="rail-meta" id="railMeta">整理章節摘要中</p>
        </div>




        <div class="rail-card">
            <div class="rail-label">章節目錄</div>
            <nav class="chapter-toc" id="chapterToc">
                <span class="toc-empty">切到任一章節後，這裡會顯示段落導覽。</span>
            </nav>
        </div>

        <div class="rail-card">
            <div class="rail-label">互動提示</div>
            <p class="rail-note">方向鍵切換章節，<code>/</code> 聚焦搜尋，程式碼區塊可一鍵複製。若系統偏好減少動畫，本站會自動切成低動態模式。</p>
        </div>
    </aside>

    <main class="main-content" id="mainContent" tabindex="-1">
    </main>

    <button class="back-to-top" id="backToTop" aria-label="回到頂端">↑</button>

    <script src="script.js"></script>
</body>
</html>
