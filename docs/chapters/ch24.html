<div class="chapter-header"><span class="chapter-number">第 24 章</span><h1>供應商降級與容錯</h1><p class="chapter-desc">自動處理 API 故障 — <code>agent/adapters.rs</code></p></div>
            <div class="content-body">
                <h2>Fallback 策略</h2>
                <p>Aixlarity 的 Provider Adapter 在遇到以下情況時自動嘗試備用供應商：</p>
                <div class="comparison-table">
                    <table>
                        <thead><tr><th>錯誤類型</th><th>HTTP 狀態碼</th><th>處理方式</th></tr></thead>
                        <tbody>
                            <tr><td>Rate Limit</td><td>429</td><td>等待 Retry-After 後重試，再失敗則切換</td></tr>
                            <tr><td>Server Error</td><td>500/502/503</td><td>立即切換備用供應商</td></tr>
                            <tr><td>連線逾時</td><td>—</td><td>切換備用供應商</td></tr>
                            <tr><td>模型不支援</td><td>400/404</td><td>報錯，不自動切換</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="source-ref"><strong>原始碼</strong>：<code>crates/aixlarity-core/src/agent/adapters.rs</code></div>
            </div>
