<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1e1e1e; padding: 50px; }
  .box { width: 300px; height: 500px; position: relative; border-radius: 12px; background: #2d2d2d; overflow: visible; }
  .box-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
  .box-rect {
    fill: none;
    stroke: url(#grad);
    stroke-width: 2;
    stroke-linecap: round;
    /* pathLength="100" means the entire perimeter is length 100 */
    stroke-dasharray: 15 85; /* 15 length visible, 85 gap */
    animation: dash 4s linear infinite;
  }
  @keyframes dash {
    from { stroke-dashoffset: 100; }
    to { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <div class="box">
    <svg class="box-svg">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#a855f7" />
          <stop offset="50%" stop-color="#3b82f6" />
          <stop offset="100%" stop-color="#4daafc" />
        </linearGradient>
      </defs>
      <!-- x="1" y="1" width="calc(100% - 2px)" to avoid stroke clipping -->
      <rect x="1" y="1" width="calc(100% - 2px)" height="calc(100% - 2px)" rx="12" ry="12" class="box-rect" pathLength="100" />
    </svg>
  </div>
</body>
</html>
