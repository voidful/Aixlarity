<!DOCTYPE html>
<html>
<head>
<style>
            .aixlarity-provider-dropdown {
                position: fixed;
                min-width: 220px; max-height: 300px; overflow-y: auto;
                background: #1e1e1e;
                border: 1px solid #444;
                border-radius: 6px; padding: 4px 0;
                box-shadow: 0 4px 16px rgba(0,0,0,0.3);
                z-index: 1000; display: block;
                color: #ddd;
            }
            .aixlarity-provider-item {
                display: flex; align-items: center; justify-content: space-between;
                padding: 6px 12px; cursor: pointer; font-size: 12px;
            }
            .aixlarity-provider-item:hover {
                background: rgba(255,255,255,0.05);
            }
            .aixlarity-provider-item.selected {
                background: rgba(0,122,204,0.3);
            }
</style>
</head>
<body>
<div class="aixlarity-provider-dropdown">
  <div class="aixlarity-provider-item"><span>Anthropic Claude</span></div>
  <div class="aixlarity-provider-item selected"><span>Google Gemini</span></div>
  <div class="aixlarity-provider-item"><span>OpenAI Codex</span></div>
</div>
</body>
</html>
