<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1e1e1e; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .box { width: 300px; height: 500px; position: relative; border-radius: 12px; background: #2d2d2d; }
  .svg-beam { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; border-radius: inherit; }
  .svg-rect { 
    fill: none; 
    stroke-width: 2px; 
    stroke-linecap: round;
    stroke-dasharray: 20 80; /* 20% beam, 80% gap */
    animation: snake 3s linear infinite;
  }
  @keyframes snake {
    from { stroke-dashoffset: 100; }
    to { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <div class="box">
    <svg class="svg-beam" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#a855f7" />
          <stop offset="50%" stop-color="#3b82f6" />
          <stop offset="100%" stop-color="#4daafc" />
        </linearGradient>
      </defs>
      <!-- wait, preserveAspectRatio="none" will distort the stroke width and border radius! -->
    </svg>
  </div>
</body>
</html>
